<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Primary SEO -->
    <title>Sports Way | Premium Sports &amp; Gym Equipment in Qatar</title>
    <meta name="description" content="Shop premium sports equipment, gym machines, flooring, supplements and sportswear at Sports Way Qatar. Best prices, fast delivery across Doha and Qatar." />
    <meta name="keywords" content="sports equipment Qatar, gym equipment Doha, sports way Qatar, gym flooring Qatar, supplements Qatar, sportswear Qatar, fitness equipment Qatar" />
    <link rel="canonical" href="https://www.sports-way.com" />

    <!-- Open Graph / Social (fallback for crawlers that don't run JS) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.sports-way.com" />
    <meta property="og:title" content="Sports Way | Premium Sports &amp; Gym Equipment in Qatar" />
    <meta property="og:description" content="Shop premium sports equipment, gym machines, flooring, supplements and sportswear at Sports Way Qatar." />
    <meta property="og:image" content="https://www.sports-way.com/og-image.jpg" />
    <meta property="og:locale" content="en_QA" />
    <meta property="og:site_name" content="Sports Way" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sports Way | Premium Sports &amp; Gym Equipment in Qatar" />
    <meta name="twitter:description" content="Shop premium sports equipment, gym machines, flooring, supplements and sportswear at Sports Way Qatar." />
    <meta name="twitter:image" content="https://www.sports-way.com/og-image.jpg" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Geo targeting for Qatar -->
    <meta name="geo.region" content="QA" />
    <meta name="geo.placename" content="Doha, Qatar" />

    <!-- Hreflang -->
    <link rel="alternate" href="https://www.sports-way.com" hreflang="en" />
    <link rel="alternate" href="https://www.sports-way.com" hreflang="ar" />
    <link rel="alternate" href="https://www.sports-way.com" hreflang="x-default" />

    <!-- Structured Data: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SportingGoodsStore",
      "name": "Sports Way",
      "url": "https://www.sports-way.com",
      "logo": "https://www.sports-way.com/logo.png",
      "image": "https://www.sports-way.com/og-image.jpg",
      "description": "Premium sports and gym equipment supplier in Qatar, serving Doha and across Qatar since 2020.",
      "telephone": "+974-3996-3997",
      "email": "sales@sportsway.com",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Zone 53, Street 740 - Al Rayyan, Building 81, 2nd floor, Office 47",
        "addressLocality": "Doha",
        "addressRegion": "Doha",
        "addressCountry": "QA"
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Saturday","Sunday","Monday","Tuesday","Wednesday","Thursday"],
          "opens": "09:00",
          "closes": "17:00"
        }
      ],
      "sameAs": [
        "https://www.instagram.com/sportswayqatar",
        "https://www.facebook.com/sportswayqatar"
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"

    />

    <script src="/supabase-config.js"></script>
